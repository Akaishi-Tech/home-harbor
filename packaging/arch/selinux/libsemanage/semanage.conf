# HomeHarbor uses a local, direct SELinux policy store.
module-store = direct
# Keep the live store writable for libsemanage's transaction and read locks.
# The image builder preserves a verified seed outside /var and an early boot
# service atomically synchronizes it after the persistent state mount appears.
store-root = /var/lib/selinux
compiler-directory = /usr/lib/selinux/hll
