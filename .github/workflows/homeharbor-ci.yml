name: HomeHarbor CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  csharp:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: make backend-restore

      - name: Lint
        run: make backend-lint

      - name: Build
        run: make backend-ci-build

      - name: Unit tests
        run: make backend-ci-test
