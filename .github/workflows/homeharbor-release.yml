name: HomeHarbor OTA and Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/homeharbor-release.yml"
      - "global.json"
      - ".gitmodules"
      - "packaging/arch/selinux/**"
      - "tools/system-build/**"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  SELINUX_DEPENDENCY_CACHE_PATH: artifacts/dependencies/selinux

jobs:
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    outputs:
      cache-key: ${{ steps.dependency-key.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve SELinux dependency cache key
        id: dependency-key
        shell: bash
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
          DOTNET_NOLOGO: "1"
        run: |
          set -euo pipefail
          command_output="$(dotnet run --project tools/system-build/src/HomeHarbor.ImageBuilder/HomeHarbor.ImageBuilder.csproj --configuration Release -- \
            selinux-dependency-key "${PWD}")"
          printf "%s\n" "${command_output}"
          fingerprint="$(printf "%s\n" "${command_output}" | tail -n 1)"
          if [[ ! "${fingerprint}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid SELinux dependency input fingerprint: ${fingerprint}" >&2
            exit 1
          fi
          cache_key="homeharbor-selinux-dependencies-v1-x86_64-${fingerprint}"
          echo "cache-key=${cache_key}" >> "${GITHUB_OUTPUT}"

      - name: Restore SELinux dependency packages
        id: dependency-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SELINUX_DEPENDENCY_CACHE_PATH }}
          key: ${{ steps.dependency-key.outputs.cache-key }}

      - name: Build or verify SELinux dependency packages in Arch Linux
        shell: bash
        env:
          CACHE_HIT: ${{ steps.dependency-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail
          docker run --rm -i \
            --privileged \
            --userns=host \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            --security-opt systempaths=unconfined \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e CACHE_HIT \
            -e SELINUX_DEPENDENCY_CACHE_PATH \
            archlinux:base-devel bash <<'HOMEHARBOR_DOCKER_SCRIPT'
              set -euo pipefail
              pacman -Syu --noconfirm --needed arch-install-scripts dotnet-sdk git sudo
              chmod u+s /usr/bin/newuidmap /usr/bin/newgidmap
              useradd -m -G wheel builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/homeharbor-builder
              chmod 0440 /etc/sudoers.d/homeharbor-builder
              printf "builder:100000:65536\n" >> /etc/subuid
              printf "builder:100000:65536\n" >> /etc/subgid
              original_uid="$(stat -c %u /workspace)"
              original_gid="$(stat -c %g /workspace)"
              restore_workspace_owner() { chown -R "${original_uid}:${original_gid}" /workspace || true; }
              trap restore_workspace_owner EXIT
              chown -R builder:builder /workspace
              export HOME=/home/builder
              export HOMEHARBOR_PACKAGE_USER=builder
              export DOTNET_CLI_TELEMETRY_OPTOUT=1
              export DOTNET_NOLOGO=1
              setpriv --reuid=builder --regid=builder --init-groups \
                --inh-caps +sys_admin,+setuid,+setgid \
                --ambient-caps +sys_admin,+setuid,+setgid \
                bash <<'HOMEHARBOR_BUILDER_SCRIPT'
                set -euo pipefail
                cd /workspace
                cache="/workspace/${SELINUX_DEPENDENCY_CACHE_PATH}"
                if [[ "${CACHE_HIT}" != "true" ]]; then
                  dotnet run --project tools/system-build/src/HomeHarbor.ImageBuilder/HomeHarbor.ImageBuilder.csproj --configuration Release -- \
                    selinux-dependency-build "${cache}" /workspace/.work/selinux-dependencies /workspace
                fi
                dotnet run --project tools/system-build/src/HomeHarbor.ImageBuilder/HomeHarbor.ImageBuilder.csproj --configuration Release -- \
                  selinux-dependency-verify "${cache}" /workspace
          HOMEHARBOR_BUILDER_SCRIPT
          HOMEHARBOR_DOCKER_SCRIPT

      - name: Save SELinux dependency packages
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.SELINUX_DEPENDENCY_CACHE_PATH }}
          key: ${{ steps.dependency-key.outputs.cache-key }}

  build:
    if: github.event_name != 'push' || github.ref_type == 'tag'
    needs: dependencies
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HOMEHARBOR_GITHUB_REPOSITORY: akaishi-tech/home-harbor
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore verified SELinux dependency packages
        id: release-dependency-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.SELINUX_DEPENDENCY_CACHE_PATH }}
          key: ${{ needs.dependencies.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Verify restored SELinux dependency packages before loading release secrets
        shell: bash
        env:
          CACHE_HIT: ${{ steps.release-dependency-cache.outputs.cache-hit }}
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"
          DOTNET_NOLOGO: "1"
        run: |
          set -euo pipefail
          if [[ "${CACHE_HIT}" != "true" ]]; then
            echo "The exact SELinux dependency package cache was not restored." >&2
            exit 1
          fi
          if ! command -v bsdtar >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes libarchive-tools
          fi
          dotnet run --project tools/system-build/src/HomeHarbor.ImageBuilder/HomeHarbor.ImageBuilder.csproj --configuration Release -- \
            selinux-dependency-verify "${PWD}/${SELINUX_DEPENDENCY_CACHE_PATH}" "${PWD}"

      - name: Resolve release coordinates
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            channel=stable
            release_tag="${GITHUB_REF_NAME}"
            version="${GITHUB_REF_NAME#v}"
          else
            channel=daily
            release_tag=daily
            short_sha="${GITHUB_SHA::7}"
            version="0.1.0-daily.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts in Arch Linux
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          CHANNEL: ${{ steps.release.outputs.channel }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          HOMEHARBOR_RELEASE_SEQUENCE: ${{ github.run_number }}
          HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM }}
          HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM: ${{ secrets.HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM }}
          HOMEHARBOR_RELEASE_KEY_ID: ${{ secrets.HOMEHARBOR_RELEASE_KEY_ID }}
          HOMEHARBOR_SECURE_BOOT_KEY_PEM: ${{ secrets.HOMEHARBOR_SECURE_BOOT_KEY_PEM }}
          HOMEHARBOR_SECURE_BOOT_CERT_PEM: ${{ secrets.HOMEHARBOR_SECURE_BOOT_CERT_PEM }}
          HOMEHARBOR_SELINUX_DEPENDENCY_CACHE: /workspace/${{ env.SELINUX_DEPENDENCY_CACHE_PATH }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM}" || -z "${HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM}" ]]; then
            echo "HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM and HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM secrets are required." >&2
            exit 1
          fi
          if [[ -z "${HOMEHARBOR_SECURE_BOOT_KEY_PEM}" || -z "${HOMEHARBOR_SECURE_BOOT_CERT_PEM}" ]]; then
            echo "HOMEHARBOR_SECURE_BOOT_KEY_PEM and HOMEHARBOR_SECURE_BOOT_CERT_PEM secrets are required." >&2
            exit 1
          fi
          docker run --rm -i \
            --privileged \
            --userns=host \
            --security-opt seccomp=unconfined \
            --security-opt apparmor=unconfined \
            --security-opt systempaths=unconfined \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e VERSION \
            -e CHANNEL \
            -e RELEASE_TAG \
            -e HOMEHARBOR_RELEASE_SEQUENCE \
            -e HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM \
            -e HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM \
            -e HOMEHARBOR_RELEASE_KEY_ID \
            -e HOMEHARBOR_SECURE_BOOT_KEY_PEM \
            -e HOMEHARBOR_SECURE_BOOT_CERT_PEM \
            -e HOMEHARBOR_SELINUX_DEPENDENCY_CACHE \
            archlinux:base-devel bash <<'HOMEHARBOR_DOCKER_SCRIPT'
              set -euo pipefail
              pacman -Syu --noconfirm --needed \
                android-tools arch-install-scripts archiso aspnet-runtime aspnet-targeting-pack base-devel btrfs-progs clang cryptsetup \
                device-mapper dosfstools dotnet-sdk efitools erofs-utils git gptfdisk grub jq lld lvm2 networkmanager openssl \
                pnpm postgresql qemu-base sbsigntools sudo systemd systemd-ukify
              chmod u+s /usr/bin/newuidmap /usr/bin/newgidmap
              useradd -m -G wheel builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/homeharbor-builder
              chmod 0440 /etc/sudoers.d/homeharbor-builder
              printf "builder:100000:65536\n" >> /etc/subuid
              printf "builder:100000:65536\n" >> /etc/subgid
              install -d -m 0700 /tmp/homeharbor-keys
              printf "%s" "${HOMEHARBOR_RELEASE_PRIVATE_KEY_PEM}" > /tmp/homeharbor-keys/release.pem
              printf "%s" "${HOMEHARBOR_RELEASE_PUBLIC_KEY_PEM}" > /tmp/homeharbor-keys/release.pub.pem
              printf "%s" "${HOMEHARBOR_SECURE_BOOT_KEY_PEM}" > /tmp/homeharbor-keys/secure-boot.key
              printf "%s" "${HOMEHARBOR_SECURE_BOOT_CERT_PEM}" > /tmp/homeharbor-keys/secure-boot.crt
              chmod 600 /tmp/homeharbor-keys/release.pem
              chmod 600 /tmp/homeharbor-keys/secure-boot.key
              chmod 644 /tmp/homeharbor-keys/release.pub.pem
              chmod 644 /tmp/homeharbor-keys/secure-boot.crt
              chown -R builder:builder /tmp/homeharbor-keys
              original_uid="$(stat -c %u /workspace)"
              original_gid="$(stat -c %g /workspace)"
              restore_workspace_owner() { chown -R "${original_uid}:${original_gid}" /workspace || true; }
              trap restore_workspace_owner EXIT
              chown -R builder:builder /workspace
              export HOMEHARBOR_RELEASE_PRIVATE_KEY=/tmp/homeharbor-keys/release.pem
              export HOMEHARBOR_RELEASE_PUBLIC_KEY=/tmp/homeharbor-keys/release.pub.pem
              export HOMEHARBOR_SECURE_BOOT=1
              export HOMEHARBOR_SECURE_BOOT_KEY=/tmp/homeharbor-keys/secure-boot.key
              export HOMEHARBOR_SECURE_BOOT_CERT=/tmp/homeharbor-keys/secure-boot.crt
              export HOMEHARBOR_SECURE_BOOT_ENROLL=manual
              export HOMEHARBOR_RELEASE_CHANNEL="${CHANNEL}"
              export HOMEHARBOR_ISO_CHANNEL="${CHANNEL}"
              export HOMEHARBOR_CHANNEL="${CHANNEL}"
              export HOMEHARBOR_GITHUB_RELEASE_TAG="${RELEASE_TAG}"
              export HOMEHARBOR_IMAGE_SIZE="${HOMEHARBOR_IMAGE_SIZE:-12G}"
              export HOMEHARBOR_PACKAGE_USER=builder
              export HOMEHARBOR_RELEASE_SKIP_FULL_E2E=1

              export HOME=/home/builder
              setpriv --reuid=builder --regid=builder --init-groups \
                --inh-caps +sys_admin,+setuid,+setgid \
                --ambient-caps +sys_admin,+setuid,+setgid \
                bash <<'HOMEHARBOR_BUILDER_SCRIPT'
                set -euo pipefail
                cd /workspace
                dotnet restore HomeHarbor.slnx
                dotnet test tests/HomeHarbor.Tests/HomeHarbor.Tests.csproj --no-restore
                pnpm install --frozen-lockfile
                pnpm frontend:typecheck
                pnpm docs:build
                dotnet run --project tools/system-build/src/HomeHarbor.ImageBuilder/HomeHarbor.ImageBuilder.csproj -- \
                  release-build system/x86_64/system/manifest.yml "${VERSION}" /workspace

                release_dir="artifacts/channels/${VERSION}"
                iso="${release_dir}/homeharbor-full-live-installer-${CHANNEL}-${VERSION}.iso"
                required_artifacts=(
                  "${release_dir}/channel-${CHANNEL}.json"
                  "${release_dir}/homeharbor-system-ota-${VERSION}.tar.gz"
                  "${release_dir}/homeharbor-kernel-generic-ota-${VERSION}.tar.gz"
                  "${iso}"
                  "${release_dir}/homeharbor-full-live-installer-${CHANNEL}-${VERSION}.iso.sha256"
                )
                for artifact in "${required_artifacts[@]}"; do
                  if [[ ! -s "${artifact}" ]]; then
                    echo "Missing release artifact: ${artifact}" >&2
                    exit 1
                  fi
                done

                release_assets=(
                  "${release_dir}/channel-${CHANNEL}.json"
                  "${release_dir}/homeharbor-system-ota-${VERSION}.tar.gz"
                  "${release_dir}/homeharbor-kernel-generic-ota-${VERSION}.tar.gz"
                  "${iso}.sha256"
                )
                github_asset_limit_bytes=2147483647
                split_part_bytes=$((1900 * 1024 * 1024))
                iso_bytes="$(stat -c %s "${iso}")"
                if (( iso_bytes <= github_asset_limit_bytes )); then
                  release_assets+=("${iso}")
                else
                  split_prefix="${iso}.part-"
                  rm -f "${split_prefix}"*
                  split -b "${split_part_bytes}" -d -a 3 "${iso}" "${split_prefix}"
                  mapfile -t iso_parts < <(find "${release_dir}" -maxdepth 1 -type f -name "$(basename "${iso}").part-*" | sort)
                  if (( ${#iso_parts[@]} < 2 )); then
                    echo "Expected split ISO parts for oversized installer: ${iso}" >&2
                    exit 1
                  fi
                  parts_manifest="${iso}.parts.txt"
                  {
                    echo "file=$(basename "${iso}")"
                    echo "size=${iso_bytes}"
                    echo "partSize=${split_part_bytes}"
                    echo "partCount=${#iso_parts[@]}"
                    echo "sha256=$(basename "${iso}.sha256")"
                    echo
                    echo "Reassemble with:"
                    echo "cat $(basename "${iso}").part-* > $(basename "${iso}")"
                    echo "sha256sum -c $(basename "${iso}.sha256")"
                  } > "${parts_manifest}"
                  release_assets+=("${iso_parts[@]}" "${parts_manifest}")
                fi
                printf "%s\n" "${release_assets[@]}" > "${release_dir}/release-assets.txt"
          HOMEHARBOR_BUILDER_SCRIPT
          HOMEHARBOR_DOCKER_SCRIPT

      - name: Publish daily release
        if: steps.release.outputs.channel == 'daily'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          CHANNEL: ${{ steps.release.outputs.channel }}
        run: |
          set -euo pipefail
          release_dir="artifacts/channels/${VERSION}"
          if [[ ! -d "${release_dir}" ]]; then
            echo "Release directory was not produced for ${VERSION}: ${release_dir}" >&2
            exit 1
          fi
          release_asset_list="${release_dir}/release-assets.txt"
          if [[ ! -s "${release_asset_list}" ]]; then
            echo "Release asset list was not produced for ${VERSION}: ${release_asset_list}" >&2
            exit 1
          fi
          mapfile -t release_assets < "${release_asset_list}"
          for asset in "${release_assets[@]}"; do
            if [[ ! -s "${asset}" ]]; then
              echo "Missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          gh release delete daily --cleanup-tag --yes || true
          git tag -f daily "${GITHUB_SHA}"
          git push origin :refs/tags/daily || true
          git push origin daily --force
          gh release create daily \
            --prerelease \
            --title "HomeHarbor Daily ${VERSION}" \
            --notes "Automated daily HomeHarbor managed artifact build. Oversized full installer ISOs are published as .part-* assets with a .parts.txt reassembly manifest." \
            "${release_assets[@]}"

      - name: Publish stable release
        if: steps.release.outputs.channel == 'stable'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          CHANNEL: ${{ steps.release.outputs.channel }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          release_dir="artifacts/channels/${VERSION}"
          if [[ ! -d "${release_dir}" ]]; then
            echo "Release directory was not produced for ${VERSION}: ${release_dir}" >&2
            exit 1
          fi
          release_asset_list="${release_dir}/release-assets.txt"
          if [[ ! -s "${release_asset_list}" ]]; then
            echo "Release asset list was not produced for ${VERSION}: ${release_asset_list}" >&2
            exit 1
          fi
          mapfile -t release_assets < "${release_asset_list}"
          for asset in "${release_assets[@]}"; do
            if [[ ! -s "${asset}" ]]; then
              echo "Missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" --verify-tag --title "HomeHarbor ${VERSION}" --notes "HomeHarbor stable release ${VERSION}."
          gh release upload "${RELEASE_TAG}" --clobber \
            "${release_assets[@]}"
