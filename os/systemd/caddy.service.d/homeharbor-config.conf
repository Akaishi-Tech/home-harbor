[Unit]
RequiresMountsFor=/var/lib/caddy

[Service]
ExecStartPre=+/usr/lib/homeharbor/agent/HomeHarbor.Agent ensure-caddy-config
ExecStart=
ExecStart=/usr/bin/caddy run --environ --config /var/lib/caddy/homeharbor/Caddyfile
ExecReload=
ExecReload=/usr/bin/caddy reload --config /var/lib/caddy/homeharbor/Caddyfile --force
